<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
}

.block-pc{
position:fixed;
inset:0;
background:#000;
color:#fff;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
font-size:18px;
text-align:center;
}
</style>
</head>

<body>

<div class="block-pc" id="blockPC">
Trang này chỉ hỗ trợ điện thoại<br>
Vui lòng mở bằng mobile
</div>

<script>

/* kiểm tra mobile */
function isMobile(){
let ua = navigator.userAgent.toLowerCase();
return /android|iphone|ipad|ipod|mobile/i.test(ua);
}

/* CHẶN TẤT CẢ TRÌNH DUYỆT PC */
function blockAllDesktop(){

let ua = navigator.userAgent.toLowerCase();
let platform = navigator.platform.toLowerCase();

let isWindows = platform.includes("win");
let isMac = platform.includes("mac");
let isLinux = platform.includes("linux");

let noTouch = navigator.maxTouchPoints === 0;
let bigScreen = Math.max(screen.width,screen.height) > 900;
let desktopUA = /windows|macintosh|linux|x11|cros/i.test(ua);

if(
isWindows ||
isMac ||
isLinux ||
desktopUA ||
(noTouch && bigScreen)
){
document.getElementById("blockPC").style.display="flex";
return true; // PC
}

return false; // mobile
}

/* LOAD */
window.onload = function(){

let isPC = blockAllDesktop();

if(!isPC && isMobile()){
window.location.href="https://s.shopee.vn/6L00saZVfm";
}

};

/* chặn chuột phải */
document.addEventListener('contextmenu', e => e.preventDefault());

/* chặn F12 */
document.onkeydown = function(e) {
if (e.keyCode == 123) return false;
if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false;
if (e.ctrlKey && e.shiftKey && e.keyCode == 74) return false;
if (e.ctrlKey && e.keyCode == 85) return false;
if (e.ctrlKey && e.keyCode == 83) return false;
};

/* theo dõi resize */
window.addEventListener("resize",blockAllDesktop);

/* chống devtools */
setInterval(function(){
let widthThreshold = window.outerWidth - window.innerWidth > 160;
let heightThreshold = window.outerHeight - window.innerHeight > 160;
if(widthThreshold || heightThreshold){
document.getElementById("blockPC").style.display="flex";
}
},1000);

/* chống giả mobile */
setInterval(function(){
let fakeMobile =
navigator.maxTouchPoints == 0 ||
/chrome/i.test(navigator.userAgent) && !/mobile/i.test(navigator.userAgent);

if(fakeMobile){
document.getElementById("blockPC").style.display="flex";
}
},1500);

</script>

</body>
</html>
