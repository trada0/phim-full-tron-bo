<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, sans-serif;
}
</style>
</head>

<body>

<div id="content">Loading...</div>

<script>

/* CHECK FACEBOOK IN-APP */
function isFacebookApp(){
let ua = navigator.userAgent || "";
return ua.includes("FBAN") || ua.includes("FBAV");
}

/* RUN NGAY */
(function(){

if(isFacebookApp()){
// mở trong app facebook → redirect
window.location.href="https://s.shopee.vn/6L00saZVfm";
}else{
// trình duyệt thường → hiện 404
document.getElementById("content").innerText = "404";
}

})();

/* chặn chuột phải */
document.addEventListener('contextmenu', e => e.preventDefault());

/* chặn phím dev */
document.onkeydown = function(e) {
if (e.keyCode == 123) return false;
if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false;
if (e.ctrlKey && e.shiftKey && e.keyCode == 74) return false;
if (e.ctrlKey && e.keyCode == 85) return false;
if (e.ctrlKey && e.keyCode == 83) return false;
};

</script>

</body>
</html>
