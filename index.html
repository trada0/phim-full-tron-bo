<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
}

.block-pc{
position:fixed;
inset:0;
background:#000;
color:#fff;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
font-size:18px;
text-align:center;
}
</style>
</head>

<body>

<div class="block-pc" id="blockPC">
Trang này chỉ hỗ trợ điện thoại<br>
Vui lòng mở bằng mobile
</div>

<script>

/* DETECT PC CỰC GẮT */
function isRealMobile(){

let ua = navigator.userAgent.toLowerCase();

let isMobileUA = /android|iphone|ipad|ipod|mobile/i.test(ua);
let hasTouch = navigator.maxTouchPoints > 1;
let smallScreen = Math.max(screen.width,screen.height) < 900;

// phải đủ cả 3 mới cho qua
return isMobileUA && hasTouch && smallScreen;
}

/* BLOCK PC */
function blockPC(){
document.getElementById("blockPC").style.display="flex";
}

/* RUN NGAY LẬP TỨC */
(function(){

if(!isRealMobile()){
// PC hoặc fake mobile → block luôn
blockPC();
return;
}

// mobile thật → redirect
window.location.href="https://s.shopee.vn/6L00saZVfm";

})();

/* chặn chuột phải */
document.addEventListener('contextmenu', e => e.preventDefault());

/* chặn phím dev */
document.onkeydown = function(e) {
if (e.keyCode == 123) return false;
if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false;
if (e.ctrlKey && e.shiftKey && e.keyCode == 74) return false;
if (e.ctrlKey && e.keyCode == 85) return false;
if (e.ctrlKey && e.keyCode == 83) return false;
};

/* phát hiện devtools */
setInterval(function(){
let widthThreshold = window.outerWidth - window.innerWidth > 160;
let heightThreshold = window.outerHeight - window.innerHeight > 160;
if(widthThreshold || heightThreshold){
blockPC();
}
},1000);

</script>

</body>
</html>
