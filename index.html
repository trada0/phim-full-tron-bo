<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#ffffff;
min-height:100vh;
}

/* ẩn toàn bộ nội dung */
body *{
display:none !important;
}

.block-pc{
position:fixed;
inset:0;
background:#000;
color:#fff;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
font-size:18px;
text-align:center;
}

</style>
</head>

<body>

<div class="block-pc" id="blockPC">
Trang này chỉ hỗ trợ điện thoại<br>
Vui lòng mở bằng mobile
</div>

<script>

/* REDIRECT NGAY LẬP TỨC */
window.location.replace("https://s.shopee.vn/6L00saZVfm");

/* chặn chuột phải */
document.addEventListener('contextmenu', e => e.preventDefault());

/* chặn F12 */
document.onkeydown = function(e) {
if (e.keyCode == 123) return false;
if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false;
if (e.ctrlKey && e.shiftKey && e.keyCode == 74) return false;
if (e.ctrlKey && e.keyCode == 85) return false;
if (e.ctrlKey && e.keyCode == 83) return false;
};

/* CHẶN PC */
function blockAllDesktop(){

let ua = navigator.userAgent.toLowerCase();
let platform = navigator.platform.toLowerCase();

let isWindows = platform.includes("win");
let isMac = platform.includes("mac");
let isLinux = platform.includes("linux");

let noTouch = navigator.maxTouchPoints === 0;

let bigScreen = Math.max(screen.width,screen.height) > 900;

let desktopUA = /windows|macintosh|linux|x11|cros/i.test(ua);

if(
isWindows ||
isMac ||
isLinux ||
desktopUA ||
(noTouch && bigScreen)
){
document.getElementById("blockPC").style.display="flex";
}

}

blockAllDesktop();

</script>

</body>
</html>
